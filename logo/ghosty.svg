<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <!-- Ghostly glow behind the mascot -->
    <radialGradient id="ambient" cx="50%" cy="40%" r="55%">
      <stop offset="0%"   stop-color="#8B5CF6" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle inner highlight for the body -->
    <linearGradient id="bodyShine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1A202C" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#161B22" stop-opacity="0"/>
    </linearGradient>

    <!-- Neon glow filter for eye glyphs -->
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle drop shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Ambient background glow -->
  <rect width="200" height="240" fill="url(#ambient)"/>

  <!-- Ghost body — polygonal geometric design -->
  <g filter="url(#shadow)">
    <path d="
      M 100 22
      C 55 22, 24 52, 24 94
      L 24 164
      L 40 180
      L 56 164
      L 72 180
      L 88 164
      L 100 176
      L 112 164
      L 128 180
      L 144 164
      L 160 180
      L 176 164
      L 176 94
      C 176 52, 145 22, 100 22 Z
    " fill="#161B22" stroke="#2D3748" stroke-width="1.2"/>

    <!-- Body shine highlight -->
    <path d="
      M 100 22
      C 55 22, 24 52, 24 94
      L 24 164
      L 40 180
      L 56 164
      L 72 180
      L 88 164
      L 100 176
      L 112 164
      L 128 180
      L 144 164
      L 160 180
      L 176 164
      L 176 94
      C 176 52, 145 22, 100 22 Z
    " fill="url(#bodyShine)" opacity="0.5"/>
  </g>

  <!-- Left eye socket — hexagonal cutout -->
  <polygon points="66,78 84,73 90,86 76,96" fill="#0D1117" stroke="#1F2937" stroke-width="0.8"/>
  <polygon points="68,80 82,76 87,86 75,94" fill="#0D1117"/>

  <!-- Left eye glyph — terminal angle bracket -->
  <text x="69" y="92" fill="#8B5CF6" font-family="'SF Mono','JetBrains Mono','Cascadia Code',monospace"
        font-size="18" font-weight="700" filter="url(#neon)">&gt;</text>

  <!-- Right eye socket — hexagonal cutout -->
  <polygon points="134,78 116,73 110,86 124,96" fill="#0D1117" stroke="#1F2937" stroke-width="0.8"/>
  <polygon points="132,80 118,76 113,86 125,94" fill="#0D1117"/>

  <!-- Right eye glyph — terminal angle bracket -->
  <text x="114" y="92" fill="#8B5CF6" font-family="'SF Mono','JetBrains Mono','Cascadia Code',monospace"
        font-size="18" font-weight="700" filter="url(#neon)">&lt;</text>

  <!-- Code line decoration — terminal prompt fragment -->
  <text x="74" y="132" fill="#4B5563" font-family="'SF Mono','JetBrains Mono',monospace"
        font-size="7.5" opacity="0.4" letter-spacing="1">_ ~ $</text>
</svg>
