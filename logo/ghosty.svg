<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7C5CFF;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#5A3FD4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B28A0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#7C5CFF;stop-opacity:0" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#7C5CFF" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- glow behind the ghost -->
  <ellipse cx="100" cy="120" rx="90" ry="100" fill="url(#glow)" />

  <!-- ghost body -->
  <g filter="url(#shadow)">
    <path d="M100 10 
             C55 10 20 45 20 90 
             L20 180 
             C20 185 25 188 30 185 
             L50 170 
             C55 165 65 165 70 170 
             L85 185 
             C90 190 100 190 105 185 
             L120 170 
             C125 165 135 165 140 170 
             L160 185 
             C165 188 170 185 170 180
             L170 90
             C170 45 145 10 100 10Z" 
          fill="url(#bodyGrad)" />
    
    <!-- left eye -->
    <ellipse cx="75" cy="85" rx="16" ry="20" fill="#1A1F2E" />
    <ellipse cx="78" cy="80" rx="6" ry="8" fill="#FFFFFF" opacity="0.85" />
    
    <!-- right eye -->
    <ellipse cx="125" cy="85" rx="16" ry="20" fill="#1A1F2E" />
    <ellipse cx="128" cy="80" rx="6" ry="8" fill="#FFFFFF" opacity="0.85" />

    <!-- cheek blush -->
    <ellipse cx="55" cy="100" rx="10" ry="6" fill="#FFC857" opacity="0.2" />
    <ellipse cx="145" cy="100" rx="10" ry="6" fill="#FFC857" opacity="0.2" />
    
    <!-- smile -->
    <path d="M85 115 Q100 130 115 115" 
          stroke="#1A1F2E" stroke-width="3" fill="none" stroke-linecap="round" />
  </g>
</svg>
